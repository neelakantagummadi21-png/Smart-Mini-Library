<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Smart Mini Library{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="{{ url_for('home') }}">Smart Mini Library</a>

        <nav class="nav">
          <a href="{{ url_for('home') }}">Home</a>
          <a href="{{ url_for('recommendations') }}">Recommendations</a>
          <a href="{{ url_for('summarize') }}">Summarize</a>
          <a href="{{ url_for('agent') }}">AI Agent</a>

        </nav>

        <div class="auth">
          {% if user %}
            <span class="pill">{{ user['username'] }}</span>
            <a class="btn btn-ghost" href="{{ url_for('logout') }}">Logout</a>
          {% else %}
            <a class="btn btn-primary" href="{{ url_for('login') }}">Login</a>
          {% endif %}
        </div>
      </div>
    </header>

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer">
      <div class="container">© {{ 2026 }} Smart Mini Library</div>
    </footer>
  </body>
</html>
